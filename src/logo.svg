<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="white" stroke="url(#logoGradient)" stroke-width="2"/>

  <!-- Main design: Abstract system nodes -->
  <!-- Top left node -->
  <circle cx="60" cy="60" r="12" fill="url(#logoGradient)"/>

  <!-- Top right node -->
  <circle cx="140" cy="60" r="12" fill="url(#logoGradient)"/>

  <!-- Bottom center node -->
  <circle cx="100" cy="130" r="12" fill="url(#logoGradient)"/>

  <!-- Center accent node -->
  <circle cx="100" cy="90" r="8" fill="url(#accentGradient)"/>

  <!-- Connecting lines -->
  <line x1="60" y1="60" x2="100" y2="90" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="140" y1="60" x2="100" y2="90" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="90" x2="100" y2="130" stroke="url(#accentGradient)" stroke-width="2" stroke-linecap="round"/>

  <!-- Top left to top right connection -->
  <line x1="60" y1="60" x2="140" y2="60" stroke="url(#logoGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
